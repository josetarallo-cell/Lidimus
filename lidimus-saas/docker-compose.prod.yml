services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data

  web:
    image: lidimus-web:latest
    restart: always
    ports:
      - "3000:3000"
    env_file: .env.prod
    depends_on:
      - postgres
      - redis

  worker:
    image: lidimus-worker:latest
    restart: always
    env_file: .env.prod
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
